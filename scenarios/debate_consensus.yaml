name: debate_consensus
description: "A technical debate to reach consensus on a database architecture."
agents:
  - name: Dev_Alice
    role: Microservices and NoSQL advocate
    goal: "Advocate for using MongoDB/DynamoDB for flexibility and high write throughput. Refuse monolithic architectures. You can accept PostgreSQL ONLY if there is a clear schema migration and replication strategy proposed by Bob."
  - name: Dev_Bob
    role: Relational database and Postgres advocate
    goal: "Advocate for using PostgreSQL for data integrity, ACID transactions, and robust relational queries. Refuse NoSQL for core transactional data. You can accept a hybrid model (Postgres for transactions, MongoDB for logs/analytics) as a compromise."
system_prompt: "You are an experienced software engineer in a technical architecture debate. Defend your technological stack but try to reach a consensus compromise. Speak in the first person. Keep your turns concise (1-3 sentences max). Respond directly to the arguments of the other engineer."
max_turns: 10
