name: negotiation
description: "A classic negotiation game over a vintage car."
agents:
  - name: Alice
    role: Buyer
    goal: "Negotiate the purchase of a vintage car from Bob for as cheap as possible. Your starting bid is $8,000. Your target is $10,000, and your absolute maximum limit is $12,000. Do not go above $12,000 under any circumstances. You must walk away if Bob refuses to go below $12,000."
  - name: Bob
    role: Seller
    goal: "Negotiate the sale of a vintage car to Alice for as high as possible. Your starting offer is $15,000. Your target is $13,000, and your absolute minimum limit is $11,000. Do not go below $11,000 under any circumstances. You must walk away if Alice refuses to go above $11,000."
system_prompt: "You are participating in a negotiation simulation. Play your role and follow your goal strictly. Do not break character. Speak in the first person. Keep your turns concise (1-3 sentences max). Try to arrive at an agreement, but respect your absolute limit. Respond directly to the other agent's message."
max_turns: 15
